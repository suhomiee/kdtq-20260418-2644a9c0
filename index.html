<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Korea Dynamic Test Questionnaire</title>
    <link rel="stylesheet" href="./styles.css?v=20260419-matching-liking-faces">
  </head>
  <body>
    <main class="stage" aria-live="polite">
      <section class="phone" aria-label="Korea Dynamic Test Questionnaire">
        <button class="profile-button" id="settingsButton" type="button" aria-label="Settings" hidden>
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="8" r="3.2"></circle>
            <path d="M5.6 20c.7-3.4 3.1-5.5 6.4-5.5s5.7 2.1 6.4 5.5"></path>
            <path d="M8 22h8"></path>
          </svg>
        </button>

        <section class="masthead">
          <p class="kicker" id="kicker">Korea Dynamic Test Questionnaire</p>
          <h1 id="screenTitle"></h1>
        </section>

        <section class="content" id="content"></section>

        <footer class="bottom-nav">
          <div class="footer-progress" aria-label="Survey progress">
            <span class="progress-count" id="progressCount">1/29</span>
            <div class="progress-track">
              <span id="progressBar"></span>
            </div>
          </div>
          <div class="nav-actions">
            <button class="fab secondary" id="backButton" type="button" aria-label="Previous">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M15 6l-6 6 6 6"></path>
              </svg>
            </button>
            <button class="fab" id="nextButton" type="button" aria-label="Next">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M9 6l6 6-6 6"></path>
              </svg>
            </button>
          </div>
        </footer>
      </section>
    </main>

    <dialog class="settings" id="settingsDialog" hidden>
      <form method="dialog" class="settings-form">
        <h2>Submission</h2>
        <label for="flowUrl">Test endpoint URL</label>
        <input id="flowUrl" type="url" autocomplete="off" spellcheck="false">
        <p id="settingsHint">Production uses the Microsoft 365 SharePoint list when opened from SharePoint.</p>
        <menu>
          <button value="cancel" type="submit">Close</button>
          <button id="saveSettings" value="default" type="button">Save</button>
        </menu>
      </form>
    </dialog>

    <script src="./app.js?v=20260419-interactive-liking"></script>
  </body>
</html>
