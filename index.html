<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Korea Dynamic Test Questionnaire</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="stage" aria-live="polite">
      <section class="phone" aria-label="Korea Dynamic Test Questionnaire">
        <header class="brand-bar">
          <a class="brand-logo" href="./" aria-label="TKG Taekwang">
            <span class="brand-main">TKG</span>
            <span class="brand-sub">TAEKWANG</span>
          </a>

          <button class="settings-button" id="settingsButton" type="button" aria-label="Submission settings">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 8.1a3.9 3.9 0 1 1 0 7.8 3.9 3.9 0 0 1 0-7.8Z"></path>
              <path d="M19.4 13.4a7.8 7.8 0 0 0 0-2.8l2-1.5-2-3.4-2.4 1a8.2 8.2 0 0 0-2.4-1.4L14.2 3H9.8l-.4 2.3A8.2 8.2 0 0 0 7 6.7l-2.4-1-2 3.4 2 1.5a7.8 7.8 0 0 0 0 2.8l-2 1.5 2 3.4 2.4-1a8.2 8.2 0 0 0 2.4 1.4l.4 2.3h4.4l.4-2.3a8.2 8.2 0 0 0 2.4-1.4l2.4 1 2-3.4-2-1.5Z"></path>
            </svg>
          </button>
        </header>

        <section class="masthead">
          <p class="kicker" id="kicker">Lets Start..</p>
          <h1 id="screenTitle"></h1>
          <div class="progress-track" aria-label="Survey progress">
            <span id="progressBar"></span>
          </div>
        </section>

        <section class="content" id="content"></section>

        <footer class="bottom-nav">
          <div class="next-preview" id="nextPreview"></div>
          <div class="nav-actions">
            <button class="fab secondary" id="backButton" type="button" aria-label="Previous">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M6 15l6-6 6 6"></path>
              </svg>
            </button>
            <button class="fab" id="nextButton" type="button" aria-label="Next">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M6 15l6-6 6 6"></path>
              </svg>
            </button>
          </div>
        </footer>
      </section>
    </main>

    <dialog class="settings" id="settingsDialog">
      <form method="dialog" class="settings-form">
        <h2>Submission</h2>
        <label for="flowUrl">Test endpoint URL</label>
        <input id="flowUrl" type="url" autocomplete="off" spellcheck="false">
        <p id="settingsHint">Production uses the Microsoft 365 SharePoint list when opened from SharePoint.</p>
        <menu>
          <button value="cancel" type="submit">Close</button>
          <button id="saveSettings" value="default" type="button">Save</button>
        </menu>
      </form>
    </dialog>

    <script src="./app.js"></script>
  </body>
</html>
